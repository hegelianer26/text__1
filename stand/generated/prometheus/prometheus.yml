global:
  scrape_interval: 5s
  evaluation_interval: 5s
rule_files:
- alerts.yml
scrape_configs:
- job_name: gateway-api
  metrics_path: /metrics
  static_configs:
  - targets:
    - gateway-api:8001
- job_name: orders-api
  metrics_path: /metrics
  static_configs:
  - targets:
    - orders-api:8000
- job_name: postgres
  static_configs:
  - targets:
    - postgres-exporter:9187
- job_name: node
  static_configs:
  - targets:
    - node-exporter:9100
- job_name: cadvisor
  static_configs:
  - targets:
    - cadvisor:8080
  metric_relabel_configs:
  - source_labels:
    - container_label_com_docker_compose_service
    target_label: service
    regex: (.+)
    replacement: $1
- job_name: prometheus
  static_configs:
  - targets:
    - prometheus:9090
