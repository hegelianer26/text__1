  grafana:
    status: ok
    metrics_endpoint: http://127.0.0.1:3000/metrics
    container_port: 3000
    published_port: 3000
    metric_family_count: 463
    metric_families:
    - help: The number of deprecated flags currently set.
      name: deprecated_flags_inuse_total
      type: counter
      sample_count: 1
    - help: Count of calls made from Go to C by the current process. Sourced from
        /cgo/go-to-c-calls:calls.
      name: go_cgo_go_to_c_calls_calls_total
      type: counter
      sample_count: 1
    - help: Estimated total CPU time goroutines spent performing GC tasks to assist
        the GC and prevent it from falling behind the application. This metric is
        an overestimate, and not directly comparable to system CPU time measurements.
        Compare only with other /cpu/classes metrics. Sourced from /cpu/classes/gc/mark/assist:cpu-seconds.
      name: go_cpu_classes_gc_mark_assist_cpu_seconds_total
      type: counter
      sample_count: 1
    - help: Estimated total CPU time spent performing GC tasks on processors (as defined
        by GOMAXPROCS) dedicated to those tasks. This metric is an overestimate, and
        not directly comparable to system CPU time measurements. Compare only with
        other /cpu/classes metrics. Sourced from /cpu/classes/gc/mark/dedicated:cpu-seconds.
      name: go_cpu_classes_gc_mark_dedicated_cpu_seconds_total
      type: counter
      sample_count: 1
    - help: Estimated total CPU time spent performing GC tasks on spare CPU resources
        that the Go scheduler could not otherwise find a use for. This should be subtracted
        from the total GC CPU time to obtain a measure of compulsory GC CPU time.
        This metric is an overestimate, and not directly comparable to system CPU
        time measurements. Compare only with other /cpu/classes metrics. Sourced from
        /cpu/classes/gc/mark/idle:cpu-seconds.
      name: go_cpu_classes_gc_mark_idle_cpu_seconds_total
      type: counter
      sample_count: 1
    - help: Estimated total CPU time spent with the application paused by the GC.
        Even if only one thread is running during the pause, this is computed as GOMAXPROCS
        times the pause latency because nothing else can be executing. This is the
        exact sum of samples in /sched/pauses/total/gc:seconds if each sample is multiplied
        by GOMAXPROCS at the time it is taken. This metric is an overestimate, and
        not directly comparable to system CPU time measurements. Compare only with
        other /cpu/classes metrics. Sourced from /cpu/classes/gc/pause:cpu-seconds.
      name: go_cpu_classes_gc_pause_cpu_seconds_total
      type: counter
      sample_count: 1
    - help: Estimated total CPU time spent performing GC tasks. This metric is an
        overestimate, and not directly comparable to system CPU time measurements.
        Compare only with other /cpu/classes metrics. Sum of all metrics in /cpu/classes/gc.
        Sourced from /cpu/classes/gc/total:cpu-seconds.
      name: go_cpu_classes_gc_total_cpu_seconds_total
      type: counter
      sample_count: 1
    - help: Estimated total available CPU time not spent executing any Go or Go runtime
        code. In other words, the part of /cpu/classes/total:cpu-seconds that was
        unused. This metric is an overestimate, and not directly comparable to system
        CPU time measurements. Compare only with other /cpu/classes metrics. Sourced
        from /cpu/classes/idle:cpu-seconds.
      name: go_cpu_classes_idle_cpu_seconds_total
      type: counter
      sample_count: 1
    - help: Estimated total CPU time spent returning unused memory to the underlying
        platform in response eagerly in response to memory pressure. This metric is
        an overestimate, and not directly comparable to system CPU time measurements.
        Compare only with other /cpu/classes metrics. Sourced from /cpu/classes/scavenge/assist:cpu-seconds.
      name: go_cpu_classes_scavenge_assist_cpu_seconds_total
      type: counter
      sample_count: 1
    - help: Estimated total CPU time spent performing background tasks to return unused
        memory to the underlying platform. This metric is an overestimate, and not
        directly comparable to system CPU time measurements. Compare only with other
        /cpu/classes metrics. Sourced from /cpu/classes/scavenge/background:cpu-seconds.
      name: go_cpu_classes_scavenge_background_cpu_seconds_total
      type: counter
      sample_count: 1
    - help: Estimated total CPU time spent performing tasks that return unused memory
        to the underlying platform. This metric is an overestimate, and not directly
        comparable to system CPU time measurements. Compare only with other /cpu/classes
        metrics. Sum of all metrics in /cpu/classes/scavenge. Sourced from /cpu/classes/scavenge/total:cpu-seconds.
      name: go_cpu_classes_scavenge_total_cpu_seconds_total
      type: counter
      sample_count: 1
    - help: Estimated total available CPU time for user Go code or the Go runtime,
        as defined by GOMAXPROCS. In other words, GOMAXPROCS integrated over the wall-clock
        duration this process has been executing for. This metric is an overestimate,
        and not directly comparable to system CPU time measurements. Compare only
        with other /cpu/classes metrics. Sum of all metrics in /cpu/classes. Sourced
        from /cpu/classes/total:cpu-seconds.
      name: go_cpu_classes_total_cpu_seconds_total
      type: counter
      sample_count: 1
    - help: Estimated total CPU time spent running user Go code. This may also include
        some small amount of time spent in the Go runtime. This metric is an overestimate,
