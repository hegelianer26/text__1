services:
  postgres:
    status: inspect_failed
    metrics_endpoint: null
    container_port: 5432
    published_port: 5432
    error: 'http://127.0.0.1:5432/metrics: Remote end closed connection without response'
  orders-api:
    status: ok
    metrics_endpoint: http://127.0.0.1:8000/metrics
    container_port: 8000
    published_port: 8000
    metric_family_count: 32
    metric_families:
    - help: Total database queries
      name: db_queries_created
      type: gauge
      labels:
      - operation
      - status
      label_values_sample:
        operation:
        - healthcheck
        - slow_select_orders
        - summary_orders
        - select_orders
        - insert_order
        status:
        - ok
      sample_count: 5
    - help: Total database queries
      name: db_queries_total
      type: counter
      labels:
      - operation
      - status
      label_values_sample:
        operation:
        - healthcheck
        - slow_select_orders
        - summary_orders
        - select_orders
        - insert_order
        status:
        - ok
      sample_count: 5
    - help: Database query latency in seconds
      name: db_query_duration_seconds
      type: histogram
      parts:
      - bucket
      - count
      - created
      - sum
      labels:
      - le
      - operation
      label_values_sample:
        le:
        - '0.001'
        - '0.005'
        - '0.01'
        - '0.05'
        - '0.1'
        operation:
        - healthcheck
        - slow_select_orders
        - summary_orders
        - select_orders
        - insert_order
      sample_count: 60
    - help: Whether database is reachable
      name: db_ready
      type: gauge
      sample_count: 1
    - help: Current in-flight inbound HTTP requests
      name: http_inflight_requests
      type: gauge
      labels:
      - path
      label_values_sample:
        path:
        - /health
        - /error
        - /orders/slow
        - /orders/summary
        - /orders
      sample_count: 6
    - help: Inbound HTTP request latency in seconds
      name: http_request_duration_seconds
      type: histogram
      parts:
      - bucket
      - count
      - created
      - sum
      labels:
      - le
      - method
      - path
      label_values_sample:
        le:
        - '0.005'
        - '0.01'
        - '0.05'
        - '0.1'
        - '0.3'
        method:
        - GET
        - POST
        path:
        - /health
        - /error
        - /orders/slow
        - /orders/summary
        - /orders
      sample_count: 91
    - help: Total inbound HTTP requests
      name: http_requests_created
      type: gauge
      labels:
      - method
      - path
      - status
      label_values_sample:
        method:
        - GET
        - POST
        path:
        - /health
        - /error
        - /orders/slow
        - /orders/summary
        - /orders
        status:
        - '200'
        - '500'
        - '201'
      sample_count: 7
    - help: Total inbound HTTP requests
      name: http_requests_total
      type: counter
      labels:
      - method
      - path
      - status
      label_values_sample:
        method:
        - GET
        - POST
        path:
        - /health
        - /error
        - /orders/slow
        - /orders/summary
        - /orders
        status:
        - '200'
        - '500'
        - '201'
      sample_count: 7
    - help: Total response bytes sent by orders-api
      name: http_response_bytes_created
      type: gauge
      labels:
      - method
      - path
      - status
      label_values_sample:
        method:
        - GET
        - POST
        path:
        - /health
        - /error
        - /orders/slow
        - /orders/summary
        - /orders
        status:
        - '200'
        - '500'
        - '201'
      sample_count: 7
    - help: Total response bytes sent by orders-api
      name: http_response_bytes_total
      type: counter
      labels:
      - method
      - path
      - status
      label_values_sample:
        method:
        - GET
        - POST
        path:
        - /health
        - /error
        - /orders/slow
        - /orders/summary
        - /orders
        status:
        - '200'
        - '500'
        - '201'
      sample_count: 7
    - help: Total intentional demo errors
      name: intentional_errors_created
      type: gauge
      labels:
      - path
      label_values_sample:
        path:
        - /error
      sample_count: 1
    - help: Total intentional demo errors
      name: intentional_errors_total
      type: counter
      labels:
      - path
      label_values_sample:
        path:
        - /error
      sample_count: 1
    - help: Total created orders
      name: orders_created_created
      type: gauge
      sample_count: 1
    - help: Total created orders
      name: orders_created_total
      type: counter
      sample_count: 1
    - help: Current number of orders in database
      name: orders_in_db
      type: gauge
      sample_count: 1
    - help: Sum of order quantities currently stored
      name: orders_quantity_sum
      type: gauge
      sample_count: 1
    - help: Total read orders
      name: orders_read_created
      type: gauge
      sample_count: 1
    - help: Total read orders
      name: orders_read_total
      type: counter
      sample_count: 1
    - help: Total summary requests
      name: orders_summary_requests_created
      type: gauge
      sample_count: 1
    - help: Total summary requests
      name: orders_summary_requests_total
      type: counter
      sample_count: 1
    - help: Total user and system CPU time spent in seconds.
      name: process_cpu_seconds_total
      type: counter
      sample_count: 1
    - help: Maximum number of open file descriptors.
      name: process_max_fds
      type: gauge
      sample_count: 1
    - help: Number of open file descriptors.
      name: process_open_fds
      type: gauge
      sample_count: 1
    - help: Resident memory size in bytes.
      name: process_resident_memory_bytes
      type: gauge
      sample_count: 1
    - help: Start time of the process since unix epoch in seconds.
      name: process_start_time_seconds
      type: gauge
      sample_count: 1
    - help: Virtual memory size in bytes.
      name: process_virtual_memory_bytes
      type: gauge
      sample_count: 1
    - help: Number of times this generation was collected
      name: python_gc_collections_total
      type: counter
      labels:
      - generation
      label_values_sample:
        generation:
        - '0'
        - '1'
        - '2'
      sample_count: 3
    - help: Objects collected during gc
      name: python_gc_objects_collected_total
      type: counter
      labels:
      - generation
      label_values_sample:
        generation:
        - '0'
        - '1'
        - '2'
      sample_count: 3
    - help: Uncollectable objects found during GC
      name: python_gc_objects_uncollectable_total
      type: counter
      labels:
      - generation
      label_values_sample:
        generation:
        - '0'
        - '1'
        - '2'
      sample_count: 3
    - help: Python platform information
      name: python_info
      type: gauge
      labels:
      - implementation
      - major
      - minor
      - patchlevel
      - version
      label_values_sample:
        implementation:
        - CPython
        major:
        - '3'
        minor:
        - '12'
        patchlevel:
        - '13'
        version:
        - 3.12.13
      sample_count: 1
    - help: Total intentionally slow requests
      name: slow_requests_created
      type: gauge
      labels:
      - path
      label_values_sample:
        path:
        - /orders/slow
        - /orders
      sample_count: 2
    - help: Total intentionally slow requests
      name: slow_requests_total
      type: counter
      labels:
      - path
      label_values_sample:
        path:
        - /orders/slow
        - /orders
      sample_count: 2
  gateway-api:
    status: ok
    metrics_endpoint: http://127.0.0.1:8001/metrics
    container_port: 8001
    published_port: 8001
    metric_family_count: 24
    metric_families:
    - help: Whether downstream orders-api is reachable
      name: downstream_up
      type: gauge
      labels:
      - target
      label_values_sample:
        target:
        - orders-api
      sample_count: 1
    - help: Current in-flight inbound HTTP requests
      name: http_inflight_requests
      type: gauge
      labels:
      - path
      label_values_sample:
        path:
        - /health
        - /proxy/error
        - /proxy/orders/slow
        - /proxy/orders/summary
        - /proxy/orders
      sample_count: 6
    - help: Inbound HTTP request latency in seconds
      name: http_request_duration_seconds
      type: histogram
      parts:
      - bucket
      - count
      - created
      - sum
      labels:
      - le
      - method
      - path
      label_values_sample:
        le:
        - '0.005'
        - '0.01'
        - '0.05'
        - '0.1'
        - '0.3'
        method:
        - GET
        - POST
        path:
        - /health
        - /proxy/error
        - /proxy/orders/slow
        - /proxy/orders/summary
        - /proxy/orders
      sample_count: 91
    - help: Total inbound HTTP requests
      name: http_requests_created
      type: gauge
      labels:
      - method
      - path
      - status
      label_values_sample:
        method:
        - GET
        - POST
        path:
        - /health
        - /proxy/error
        - /proxy/orders/slow
        - /proxy/orders/summary
        - /proxy/orders
        status:
        - '200'
        - '500'
        - '201'
      sample_count: 7
    - help: Total inbound HTTP requests
      name: http_requests_total
      type: counter
      labels:
      - method
      - path
      - status
      label_values_sample:
        method:
        - GET
        - POST
        path:
        - /health
        - /proxy/error
        - /proxy/orders/slow
        - /proxy/orders/summary
        - /proxy/orders
        status:
        - '200'
        - '500'
        - '201'
      sample_count: 7
    - help: Total response bytes sent by gateway-api
      name: http_response_bytes_created
      type: gauge
      labels:
      - method
      - path
      - status
      label_values_sample:
        method:
        - GET
        - POST
        path:
        - /health
        - /proxy/error
        - /proxy/orders/slow
        - /proxy/orders/summary
        - /proxy/orders
        status:
        - '200'
        - '500'
        - '201'
      sample_count: 7
    - help: Total response bytes sent by gateway-api
      name: http_response_bytes_total
      type: counter
      labels:
      - method
      - path
      - status
      label_values_sample:
        method:
        - GET
        - POST
        path:
        - /health
        - /proxy/error
        - /proxy/orders/slow
        - /proxy/orders/summary
        - /proxy/orders
        status:
        - '200'
        - '500'
        - '201'
      sample_count: 7
    - help: Outbound HTTP request latency in seconds
      name: outbound_http_request_duration_seconds
      type: histogram
      parts:
      - bucket
      - count
      - created
      - sum
      labels:
      - le
      - method
      - target
      label_values_sample:
        le:
        - '0.005'
        - '0.01'
        - '0.05'
        - '0.1'
        - '0.3'
        method:
        - GET
        - POST
        target:
        - /error
        - /orders/slow
        - /orders/summary
        - /orders
      sample_count: 65
    - help: Total outbound HTTP requests from gateway-api
      name: outbound_http_requests_created
      type: gauge
      labels:
      - method
      - status
      - target
      label_values_sample:
        method:
        - GET
        - POST
        status:
        - '500'
        - '200'
        - '201'
        target:
        - /error
        - /orders/slow
        - /orders/summary
        - /orders
      sample_count: 5
    - help: Total outbound HTTP requests from gateway-api
      name: outbound_http_requests_total
      type: counter
      labels:
      - method
      - status
      - target
      label_values_sample:
        method:
        - GET
        - POST
        status:
        - '500'
        - '200'
        - '201'
        target:
        - /error
        - /orders/slow
        - /orders/summary
        - /orders
      sample_count: 5
    - help: Total response bytes received by gateway-api from downstream
      name: outbound_http_response_bytes_created
      type: gauge
      labels:
      - method
      - status
      - target
      label_values_sample:
        method:
        - GET
        - POST
        status:
        - '500'
        - '200'
        - '201'
        target:
        - /error
        - /orders/slow
        - /orders/summary
        - /orders
      sample_count: 5
    - help: Total response bytes received by gateway-api from downstream
      name: outbound_http_response_bytes_total
      type: counter
      labels:
      - method
      - status
      - target
      label_values_sample:
        method:
        - GET
        - POST
        status:
        - '500'
        - '200'
        - '201'
        target:
        - /error
        - /orders/slow
        - /orders/summary
        - /orders
      sample_count: 5
    - help: Total user and system CPU time spent in seconds.
      name: process_cpu_seconds_total
      type: counter
      sample_count: 1
    - help: Maximum number of open file descriptors.
      name: process_max_fds
      type: gauge
      sample_count: 1
    - help: Number of open file descriptors.
      name: process_open_fds
      type: gauge
      sample_count: 1
    - help: Resident memory size in bytes.
      name: process_resident_memory_bytes
      type: gauge
      sample_count: 1
    - help: Start time of the process since unix epoch in seconds.
      name: process_start_time_seconds
      type: gauge
      sample_count: 1
    - help: Virtual memory size in bytes.
      name: process_virtual_memory_bytes
      type: gauge
      sample_count: 1
    - help: Gateway actions by type
      name: proxy_actions_created
      type: gauge
      labels:
      - action
      - status
      label_values_sample:
        action:
        - forced_error
        - slow_call
        - orders_summary
        - list_orders
        - create_order
        status:
        - downstream_5xx
        - ok
      sample_count: 5
    - help: Gateway actions by type
      name: proxy_actions_total
      type: counter
      labels:
      - action
      - status
      label_values_sample:
        action:
        - forced_error
        - slow_call
        - orders_summary
        - list_orders
        - create_order
        status:
        - downstream_5xx
        - ok
      sample_count: 5
    - help: Number of times this generation was collected
      name: python_gc_collections_total
      type: counter
      labels:
      - generation
      label_values_sample:
        generation:
        - '0'
        - '1'
        - '2'
      sample_count: 3
    - help: Objects collected during gc
      name: python_gc_objects_collected_total
      type: counter
      labels:
      - generation
      label_values_sample:
        generation:
        - '0'
        - '1'
        - '2'
      sample_count: 3
    - help: Uncollectable objects found during GC
      name: python_gc_objects_uncollectable_total
      type: counter
      labels:
      - generation
      label_values_sample:
        generation:
        - '0'
        - '1'
        - '2'
      sample_count: 3
    - help: Python platform information
      name: python_info
      type: gauge
      labels:
      - implementation
      - major
      - minor
      - patchlevel
      - version
      label_values_sample:
        implementation:
        - CPython
        major:
        - '3'
        minor:
        - '12'
        patchlevel:
        - '13'
        version:
        - 3.12.13
      sample_count: 1
  traffic-gen:
    status: no_published_port
    metrics_endpoint: null
    container_port: null
    published_port: null
    error: No published host port found in docker-compose.yml.
  postgres-exporter:
    status: ok
    metrics_endpoint: http://127.0.0.1:9187/metrics
    container_port: 9187
    published_port: 9187
    metric_family_count: 383
    metric_families:
    - help: A summary of the wall-time pause (stop-the-world) duration in garbage
        collection cycles.
      name: go_gc_duration_seconds
      type: summary
      parts:
      - count
      - sum
      labels:
      - quantile
      label_values_sample:
        quantile:
        - '0'
        - '0.25'
        - '0.5'
        - '0.75'
        - '1'
      sample_count: 7
    - help: Heap size target percentage configured by the user, otherwise 100. This
        value is set by the GOGC environment variable, and the runtime/debug.SetGCPercent
        function. Sourced from /gc/gogc:percent.
      name: go_gc_gogc_percent
      type: gauge
      sample_count: 1
    - help: Go runtime memory limit configured by the user, otherwise math.MaxInt64.
        This value is set by the GOMEMLIMIT environment variable, and the runtime/debug.SetMemoryLimit
        function. Sourced from /gc/gomemlimit:bytes.
      name: go_gc_gomemlimit_bytes
      type: gauge
      sample_count: 1
    - help: Number of goroutines that currently exist.
      name: go_goroutines
      type: gauge
      sample_count: 1
    - help: Information about the Go environment.
      name: go_info
      type: gauge
      labels:
      - version
      label_values_sample:
        version:
        - go1.25.7
      sample_count: 1
    - help: Number of bytes allocated in heap and currently in use. Equals to /memory/classes/heap/objects:bytes.
      name: go_memstats_alloc_bytes
      type: gauge
      sample_count: 1
    - help: Total number of bytes allocated in heap until now, even if released already.
        Equals to /gc/heap/allocs:bytes.
      name: go_memstats_alloc_bytes_total
      type: counter
      sample_count: 1
    - help: Number of bytes used by the profiling bucket hash table. Equals to /memory/classes/profiling/buckets:bytes.
      name: go_memstats_buck_hash_sys_bytes
      type: gauge
      sample_count: 1
    - help: Total number of heap objects frees. Equals to /gc/heap/frees:objects +
        /gc/heap/tiny/allocs:objects.
      name: go_memstats_frees_total
      type: counter
      sample_count: 1
    - help: Number of bytes used for garbage collection system metadata. Equals to
        /memory/classes/metadata/other:bytes.
      name: go_memstats_gc_sys_bytes
      type: gauge
      sample_count: 1
    - help: Number of heap bytes allocated and currently in use, same as go_memstats_alloc_bytes.
        Equals to /memory/classes/heap/objects:bytes.
      name: go_memstats_heap_alloc_bytes
      type: gauge
      sample_count: 1
    - help: Number of heap bytes waiting to be used. Equals to /memory/classes/heap/released:bytes
        + /memory/classes/heap/free:bytes.
      name: go_memstats_heap_idle_bytes
      type: gauge
      sample_count: 1
    - help: Number of heap bytes that are in use. Equals to /memory/classes/heap/objects:bytes
        + /memory/classes/heap/unused:bytes
      name: go_memstats_heap_inuse_bytes
      type: gauge
      sample_count: 1
    - help: Number of currently allocated objects. Equals to /gc/heap/objects:objects.
      name: go_memstats_heap_objects
      type: gauge
      sample_count: 1
    - help: Number of heap bytes released to OS. Equals to /memory/classes/heap/released:bytes.
      name: go_memstats_heap_released_bytes
      type: gauge
      sample_count: 1
    - help: Number of heap bytes obtained from system. Equals to /memory/classes/heap/objects:bytes
        + /memory/classes/heap/unused:bytes + /memory/classes/heap/released:bytes
        + /memory/classes/heap/free:bytes.
      name: go_memstats_heap_sys_bytes
      type: gauge
      sample_count: 1
    - help: Number of seconds since 1970 of last garbage collection.
      name: go_memstats_last_gc_time_seconds
      type: gauge
      sample_count: 1
    - help: Total number of heap objects allocated, both live and gc-ed. Semantically
        a counter version for go_memstats_heap_objects gauge. Equals to /gc/heap/allocs:objects
        + /gc/heap/tiny/allocs:objects.
      name: go_memstats_mallocs_total
      type: counter
      sample_count: 1
    - help: Number of bytes in use by mcache structures. Equals to /memory/classes/metadata/mcache/inuse:bytes.
      name: go_memstats_mcache_inuse_bytes
      type: gauge
      sample_count: 1
    - help: Number of bytes used for mcache structures obtained from system. Equals
        to /memory/classes/metadata/mcache/inuse:bytes + /memory/classes/metadata/mcache/free:bytes.
      name: go_memstats_mcache_sys_bytes
      type: gauge
      sample_count: 1
    - help: Number of bytes in use by mspan structures. Equals to /memory/classes/metadata/mspan/inuse:bytes.
      name: go_memstats_mspan_inuse_bytes
      type: gauge
      sample_count: 1
    - help: Number of bytes used for mspan structures obtained from system. Equals
        to /memory/classes/metadata/mspan/inuse:bytes + /memory/classes/metadata/mspan/free:bytes.
      name: go_memstats_mspan_sys_bytes
      type: gauge
      sample_count: 1
    - help: Number of heap bytes when next garbage collection will take place. Equals
        to /gc/heap/goal:bytes.
      name: go_memstats_next_gc_bytes
      type: gauge
      sample_count: 1
    - help: Number of bytes used for other system allocations. Equals to /memory/classes/other:bytes.
      name: go_memstats_other_sys_bytes
      type: gauge
      sample_count: 1
    - help: Number of bytes obtained from system for stack allocator in non-CGO environments.
        Equals to /memory/classes/heap/stacks:bytes.
      name: go_memstats_stack_inuse_bytes
      type: gauge
      sample_count: 1
    - help: Number of bytes obtained from system for stack allocator. Equals to /memory/classes/heap/stacks:bytes
        + /memory/classes/os-stacks:bytes.
      name: go_memstats_stack_sys_bytes
      type: gauge
      sample_count: 1
    - help: Number of bytes obtained from system. Equals to /memory/classes/total:byte.
      name: go_memstats_sys_bytes
      type: gauge
      sample_count: 1
    - help: The current runtime.GOMAXPROCS setting, or the number of operating system
        threads that can execute user-level Go code simultaneously. Sourced from /sched/gomaxprocs:threads.
      name: go_sched_gomaxprocs_threads
      type: gauge
      sample_count: 1
    - help: Number of OS threads created.
      name: go_threads
      type: gauge
      sample_count: 1
    - help: Connection limit set for the database
      name: pg_database_connection_limit
      type: gauge
      labels:
      - datname
      label_values_sample:
        datname:
        - app
        - postgres
        - template0
        - template1
      sample_count: 4
    - help: Disk space used by the database
      name: pg_database_size_bytes
      type: gauge
      labels:
      - datname
      label_values_sample:
        datname:
        - app
        - postgres
        - template0
        - template1
      sample_count: 4
    - help: Duration of the last scrape of metrics from PostgreSQL.
      name: pg_exporter_last_scrape_duration_seconds
      type: gauge
      sample_count: 1
    - help: Whether the last scrape of metrics from PostgreSQL resulted in an error
        (1 for error, 0 for success).
      name: pg_exporter_last_scrape_error
      type: gauge
      sample_count: 1
    - help: Total number of times PostgreSQL was scraped for metrics.
      name: pg_exporter_scrapes_total
      type: counter
      sample_count: 1
    - help: Number of locks
      name: pg_locks_count
      type: gauge
      labels:
      - datname
      - mode
      label_values_sample:
        datname:
        - app
        - postgres
        - template0
        - template1
        mode:
        - accessexclusivelock
        - accesssharelock
        - exclusivelock
        - rowexclusivelock
        - rowsharelock
      sample_count: 36
    - help: Indicates if the server is a replica
      name: pg_replication_is_replica
      type: gauge
      sample_count: 1
    - help: Replication lag behind master in seconds
      name: pg_replication_lag_seconds
      type: gauge
      sample_count: 1
    - help: Age of last replay in seconds
      name: pg_replication_last_replay_seconds
      type: gauge
      sample_count: 1
    - help: Connection limit set for the role
      name: pg_roles_connection_limit
      type: gauge
      labels:
      - rolname
      label_values_sample:
        rolname:
        - app
        - pg_checkpoint
        - pg_create_subscription
        - pg_database_owner
        - pg_execute_server_program
