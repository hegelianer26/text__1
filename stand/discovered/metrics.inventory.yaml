  prometheus:
    status: ok
    metrics_endpoint: http://127.0.0.1:9090/metrics
    container_port: 9090
    published_port: 9090
    metric_family_count: 257
    metric_families:
    - help: Approximate total count of cleanup functions (created by runtime.AddCleanup)
        executed by the runtime. Subtract /gc/cleanups/queued:cleanups to approximate
        cleanup queue length. Useful for detecting slow cleanups holding up the queue.
        Sourced from /gc/cleanups/executed:cleanups.
      name: go_gc_cleanups_executed_cleanups_total
      type: counter
      sample_count: 1
    - help: Approximate total count of cleanup functions (created by runtime.AddCleanup)
        queued by the runtime for execution. Subtract from /gc/cleanups/executed:cleanups
        to approximate cleanup queue length. Useful for detecting slow cleanups holding
        up the queue. Sourced from /gc/cleanups/queued:cleanups.
      name: go_gc_cleanups_queued_cleanups_total
      type: counter
      sample_count: 1
    - help: Count of completed GC cycles generated by the Go runtime. Sourced from
        /gc/cycles/automatic:gc-cycles.
      name: go_gc_cycles_automatic_gc_cycles_total
      type: counter
      sample_count: 1
    - help: Count of completed GC cycles forced by the application. Sourced from /gc/cycles/forced:gc-cycles.
      name: go_gc_cycles_forced_gc_cycles_total
      type: counter
      sample_count: 1
    - help: Count of all completed GC cycles. Sourced from /gc/cycles/total:gc-cycles.
      name: go_gc_cycles_total_gc_cycles_total
      type: counter
      sample_count: 1
    - help: A summary of the wall-time pause (stop-the-world) duration in garbage
        collection cycles.
      name: go_gc_duration_seconds
      type: summary
      parts:
      - count
      - sum
      labels:
      - quantile
      label_values_sample:
        quantile:
        - '0'
        - '0.25'
        - '0.5'
        - '0.75'
        - '1'
      sample_count: 7
    - help: Total count of finalizer functions (created by runtime.SetFinalizer) executed
        by the runtime. Subtract /gc/finalizers/queued:finalizers to approximate finalizer
        queue length. Useful for detecting finalizers overwhelming the queue, either
        by being too slow, or by there being too many of them. Sourced from /gc/finalizers/executed:finalizers.
      name: go_gc_finalizers_executed_finalizers_total
      type: counter
      sample_count: 1
    - help: Total count of finalizer functions (created by runtime.SetFinalizer) and
        queued by the runtime for execution. Subtract from /gc/finalizers/executed:finalizers
        to approximate finalizer queue length. Useful for detecting slow finalizers
        holding up the queue. Sourced from /gc/finalizers/queued:finalizers.
      name: go_gc_finalizers_queued_finalizers_total
      type: counter
      sample_count: 1
    - help: Heap size target percentage configured by the user, otherwise 100. This
        value is set by the GOGC environment variable, and the runtime/debug.SetGCPercent
        function. Sourced from /gc/gogc:percent.
      name: go_gc_gogc_percent
      type: gauge
      sample_count: 1
    - help: Go runtime memory limit configured by the user, otherwise math.MaxInt64.
        This value is set by the GOMEMLIMIT environment variable, and the runtime/debug.SetMemoryLimit
        function. Sourced from /gc/gomemlimit:bytes.
      name: go_gc_gomemlimit_bytes
      type: gauge
      sample_count: 1
    - help: Distribution of heap allocations by approximate size. Bucket counts increase
        monotonically. Note that this does not include tiny objects as defined by
        /gc/heap/tiny/allocs:objects, only tiny blocks. Sourced from /gc/heap/allocs-by-size:bytes.
      name: go_gc_heap_allocs_by_size_bytes
      type: histogram
      parts:
      - bucket
      - count
      - sum
      labels:
      - le
      label_values_sample:
        le:
        - '8.999999999999998'
        - '24.999999999999996'
        - '64.99999999999999'
        - '144.99999999999997'
        - '320.99999999999994'
      sample_count: 14
    - help: Cumulative sum of memory allocated to the heap by the application. Sourced
        from /gc/heap/allocs:bytes.
      name: go_gc_heap_allocs_bytes_total
      type: counter
      sample_count: 1
    - help: Cumulative count of heap allocations triggered by the application. Note
        that this does not include tiny objects as defined by /gc/heap/tiny/allocs:objects,
        only tiny blocks. Sourced from /gc/heap/allocs:objects.
      name: go_gc_heap_allocs_objects_total
      type: counter
      sample_count: 1
    - help: Distribution of freed heap allocations by approximate size. Bucket counts
        increase monotonically. Note that this does not include tiny objects as defined
        by /gc/heap/tiny/allocs:objects, only tiny blocks. Sourced from /gc/heap/frees-by-size:bytes.
      name: go_gc_heap_frees_by_size_bytes
      type: histogram
      parts:
      - bucket
      - count
      - sum
      labels:
      - le
      label_values_sample:
        le:
        - '8.999999999999998'
        - '24.999999999999996'
        - '64.99999999999999'
        - '144.99999999999997'
        - '320.99999999999994'
      sample_count: 14
    - help: Cumulative sum of heap memory freed by the garbage collector. Sourced
        from /gc/heap/frees:bytes.
      name: go_gc_heap_frees_bytes_total
      type: counter
      sample_count: 1
    - help: Cumulative count of heap allocations whose storage was freed by the garbage
        collector. Note that this does not include tiny objects as defined by /gc/heap/tiny/allocs:objects,
        only tiny blocks. Sourced from /gc/heap/frees:objects.
      name: go_gc_heap_frees_objects_total
      type: counter
      sample_count: 1
    - help: Heap size target for the end of the GC cycle. Sourced from /gc/heap/goal:bytes.
      name: go_gc_heap_goal_bytes
      type: gauge
      sample_count: 1
    - help: Heap memory occupied by live objects that were marked by the previous
        GC. Sourced from /gc/heap/live:bytes.
      name: go_gc_heap_live_bytes
      type: gauge
      sample_count: 1
    - help: Number of objects, live or unswept, occupying heap memory. Sourced from
        /gc/heap/objects:objects.
      name: go_gc_heap_objects_objects
      type: gauge
      sample_count: 1
    - help: Count of small allocations that are packed together into blocks. These
        allocations are counted separately from other allocations because each individual
        allocation is not tracked by the runtime, only their block. Each block is
        already accounted for in allocs-by-size and frees-by-size. Sourced from /gc/heap/tiny/allocs:objects.
      name: go_gc_heap_tiny_allocs_objects_total
      type: counter
      sample_count: 1
    - help: GC cycle the last time the GC CPU limiter was enabled. This metric is
        useful for diagnosing the root cause of an out-of-memory error, because the
