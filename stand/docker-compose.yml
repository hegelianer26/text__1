services:
  postgres:
    image: postgres:16
    container_name: postgres
    environment:
      POSTGRES_DB: app
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d app"]
      interval: 5s
      timeout: 3s
      retries: 20

  orders-api:
    build:
      context: ./apps/orders-api
    container_name: orders-api
    environment:
      APP_PORT: "8000"
      POSTGRES_DSN: "postgresql://app:app@postgres:5432/app"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).read()"]
      interval: 5s
      timeout: 3s
      retries: 20

  gateway-api:
    build:
      context: ./apps/gateway-api
    container_name: gateway-api
    environment:
      APP_PORT: "8001"
      ORDERS_API_URL: "http://orders-api:8000"
    ports:
      - "8001:8001"
    depends_on:
      orders-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/health', timeout=3).read()"]
      interval: 5s
      timeout: 3s
      retries: 20

  traffic-gen:
    build:
      context: ./apps/traffic-gen
    container_name: traffic-gen
    environment:
      GATEWAY_API_URL: "http://gateway-api:8001"
      LOOP_INTERVAL_SECONDS: "0.6"
      BURST_EVERY_N: "20"
      BURST_SIZE: "18"
    depends_on:
      gateway-api:
        condition: service_healthy

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: postgres-exporter
    environment:
      DATA_SOURCE_NAME: "postgresql://app:app@postgres:5432/app?sslmode=disable"
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "9187:9187"

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    volumes:
      - ./generated/prometheus:/etc/prometheus:ro
    depends_on:
      gateway-api:
        condition: service_healthy
      orders-api:
        condition: service_healthy
      postgres-exporter:
        condition: service_started
      node-exporter:
        condition: service_started
      cadvisor:
        condition: service_started
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./generated/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      prometheus:
        condition: service_started
    ports:
      - "3000:3000"

  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    command:
      - "--path.rootfs=/host"
    pid: host
    volumes:
      - "/:/host:ro,rslave"
    ports:
      - "9100:9100"

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    privileged: true
    devices:
      - /dev/kmsg:/dev/kmsg
    command:
      - --docker_only=true
      - --store_container_labels=true
      - --housekeeping_interval=10s
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /dev/disk:/dev/disk:ro
    ports:
      - "8080:8080"

volumes:
  pgdata: